<h2>通知提醒方式</h2>
<p class="subtitle">番茄钟结束时通知用户的方式</p>

<div class="options">
  <div class="option" data-choice="a" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>系统桌面通知</h3>
      <p>使用系统原生长通知，像日历提醒一样</p>
    </div>
  </div>
  <div class="option" data-choice="b" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>通知 + 声音</h3>
      <p>桌面通知配合提示音，适合嘈杂环境</p>
    </div>
  </div>
  <div class="option" data-choice="c" onclick="toggleSelect(this)">
    <div class="letter">C</div>
    <div class="content">
      <h3>通知 + 声音 + 悬浮小组件</h3>
      <p>桌面弹出计时器窗口，适合需要视觉提醒的用户</p>
    </div>
  </div>
</div>
