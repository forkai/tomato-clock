<h2>界面风格选择</h2>
<p class="subtitle">番茄钟应用的整体视觉风格</p>

<div class="options">
  <div class="option" data-choice="minimal" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>简约专注</h3>
      <p>大面积留白，单色系，只有计时器核心功能</p>
    </div>
  </div>
  <div class="option" data-choice="playful" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>活力番茄</h3>
      <p>番茄红为主色，有趣味图标，适合刚开始用番茄钟的用户</p>
    </div>
  </div>
  <div class="option" data-choice="dark" onclick="toggleSelect(this)">
    <div class="letter">C</div>
    <div class="content">
      <h3>深色沉浸</h3>
      <p>深色背景保护眼睛，适合长时间工作环境</p>
    </div>
  </div>
</div>
