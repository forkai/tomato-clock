<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="tomatoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f87171"/>
      <stop offset="100%" style="stop-color:#dc2626"/>
    </linearGradient>
    <linearGradient id="leafGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4ade80"/>
      <stop offset="100%" style="stop-color:#16a34a"/>
    </linearGradient>
  </defs>

  <!-- 番茄阴影 -->
  <ellipse cx="256" cy="300" rx="155" ry="145" fill="#000" opacity="0.2"/>

  <!-- 番茄主体 -->
  <circle cx="256" cy="275" r="150" fill="url(#tomatoGrad)"/>

  <!-- 番茄顶部凹陷 -->
  <ellipse cx="256" cy="140" rx="40" ry="20" fill="#b91c1c"/>

  <!-- 左叶子 -->
  <path d="M230 135 Q160 80 140 120 Q170 80 220 110 Q180 90 230 135" fill="url(#leafGrad)"/>

  <!-- 中叶子 -->
  <path d="M256 130 Q256 60 256 50 Q266 80 270 100 Q265 70 276 50 Q266 90 256 130" fill="url(#leafGrad)"/>

  <!-- 右叶子 -->
  <path d="M282 135 Q350 80 372 120 Q342 80 292 110 Q332 90 282 135" fill="url(#leafGrad)"/>

  <!-- 番茄表面光泽 -->
  <circle cx="200" cy="230" r="40" fill="#fff" opacity="0.2"/>

  <!-- 计时器表盘 -->
  <circle cx="256" cy="275" r="100" fill="#030712" opacity="0.9"/>

  <!-- 时钟刻度 -->
  <g stroke="#fff" stroke-width="3" stroke-linecap="round">
    <line x1="256" y1="195" x2="256" y2="205"/>
    <line x1="256" y1="345" x2="256" y2="355"/>
    <line x1="171" y1="275" x2="181" y2="275"/>
    <line x1="331" y1="275" x2="341" y2="275"/>
  </g>

  <!-- 时针 -->
  <line x1="256" y1="275" x2="256" y2="220" stroke="#ef4444" stroke-width="8" stroke-linecap="round"/>

  <!-- 分针 -->
  <line x1="256" y1="275" x2="300" y2="295" stroke="#fff" stroke-width="5" stroke-linecap="round"/>

  <!-- 中心点 -->
  <circle cx="256" cy="275" r="8" fill="#ef4444"/>
</svg>