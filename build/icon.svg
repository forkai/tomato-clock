<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <!-- 番茄主体 - 填满整个画布 -->
  <circle cx="128" cy="128" r="128" fill="#dc2626"/>
  <!-- 高光 -->
  <circle cx="90" cy="95" r="40" fill="#f87171" opacity="0.5"/>
  <!-- 凹陷 -->
  <circle cx="128" cy="8" r="25" fill="#b91c1c"/>

  <!-- 表盘 -->
  <circle cx="128" cy="130" r="75" fill="#030712"/>

  <!-- 刻度 -->
  <line x1="128" y1="70" x2="128" y2="78" stroke="#fff" stroke-width="4" stroke-linecap="round"/>
  <line x1="188" y1="130" x2="180" y2="130" stroke="#fff" stroke-width="4" stroke-linecap="round"/>
  <line x1="128" y1="190" x2="128" y2="182" stroke="#fff" stroke-width="4" stroke-linecap="round"/>
  <line x1="68" y1="130" x2="76" y2="130" stroke="#fff" stroke-width="4" stroke-linecap="round"/>

  <!-- 时针 - 10点方向 -->
  <line x1="128" y1="130" x2="105" y2="100" stroke="#ef4444" stroke-width="7" stroke-linecap="round"/>

  <!-- 分针 - 2点方向 -->
  <line x1="128" y1="130" x2="168" y2="148" stroke="#fff" stroke-width="5" stroke-linecap="round"/>

  <!-- 中心点 -->
  <circle cx="128" cy="130" r="7" fill="#ef4444"/>
</svg>