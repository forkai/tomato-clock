appId: com.tomato.clock
productName: 番茄钟
directories:
  buildResources: build
  output: release
electronDist: node_modules/electron/dist
files:
  - dist/**/*
  - dist-electron/*.js
  - package.json
extraResources:
  - from: build/
    to: build/
    filter:
      - "**/*"
asar: true
win:
  target: portable
  signAndEditExecutable: false
